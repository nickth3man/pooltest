<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Billiards</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%231a5137'/%3E%3Ccircle cx='32' cy='32' r='16' fill='%23f4ebd7'/%3E%3Ccircle cx='32' cy='32' r='5' fill='%231a1308'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="game-header">
        <p class="kicker">Classic Table Mode</p>
        <h1>Billiards</h1>
        <div class="header-line" aria-hidden="true"></div>
      </header>

      <div class="table-stage">
        <div class="stage-glow" aria-hidden="true"></div>
        <div class="stage-frame" aria-hidden="true"></div>
        <canvas
          id="table"
          width="1600"
          height="500"
          role="img"
          aria-label="Billiards table game. Use mouse to aim and shoot the cue ball."
        ></canvas>
      </div>

      <div class="hud">
        <div class="hud-card stats">
          <span class="label">Sunk</span>
          <span id="sunk-count" class="value">0</span>
        </div>
        <div class="hud-card state">
          <span class="label">State</span>
          <span id="state-text" class="value" aria-live="polite">AIMING</span>
        </div>
        <div class="hud-card actions">
          <span
            id="shoot-indicator"
            class="ready"
            role="status"
            aria-live="polite"
            >Take the shot</span
          >
          <button id="restart-btn" type="button">New Rack</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
