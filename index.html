<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Billiards</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <div class="hud-group">
        <span>Sunk: <span id="sunk-count" class="value">0</span></span>
        <span>State: <span id="state-text" class="value">AIMING</span></span>
        <span id="shoot-indicator" class="ready">Shoot!</span>
      </div>
      <button id="restart-btn" type="button">Restart</button>
    </div>
    <canvas id="table" width="900" height="500"></canvas>
  </div>

  <script type="module" src="dist/main.js"></script>
</body>
</html>
